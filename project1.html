<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

  <title>Direction</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      text-align: center;
      padding: 80px 20px 30px;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 8vw, 80px);
      letter-spacing: 6px;
      color: #e8c97e;
    }

    .gallery {
      max-width: 1200px;
      margin: auto;
      padding: 0 20px;
    }

    .project {
      margin: 60px 0;
    }

    .project-title {
      font-size: 20px;
      margin-bottom: 20px;
      color: #e8c97e;
      letter-spacing: 1px;
    }

    .image-container {
      margin: 25px 0;
    }

    .image-container img {
      width: 100%;
      height: auto; /* no cropping */
      display: block;
      border-radius: 12px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin: 60px 0;
      color: #e8c97e;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .project {
        margin: 40px 0;
      }

      .project-title {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>DIRECTION</h1>
  </div>

  <!-- GALLERY -->
  <div class="gallery">

    <!-- PROJECT 1 -->
    <div class="project">
      <div class="project-title">PROJECT 1</div>

      <div class="image-container">
        <img src="direction/1.png" alt="">
      </div>

      <div class="image-container">
        <img src="direction/2.png" alt="">
      </div>

      <div class="image-container">
        <img src="direction/3.png" alt="">
      </div>
    </div>

    <!-- PROJECT 2 -->
    <div class="project">
      <div class="project-title">PROJECT 2</div>

      <div class="image-container">
        <img src="direction/4.png" alt="">
      </div>

      <div class="image-container">
        <img src="direction/5.png" alt="">
      </div>

      <div class="image-container">
        <img src="direction/6.png" alt="">
      </div>
    </div>

    <!-- PROJECT 3 -->
    <div class="project">
      <div class="project-title">PROJECT 3</div>

      <div class="image-container">
        <img src="direction/7.png" alt="">
      </div>

      <div class="image-container">
        <img src="direction/8.png" alt="">
      </div>
    </div>

  </div>

  <!-- BACK BUTTON -->
  <a href="index.html" class="back-link">← Back to Portfolio</a>

</body>
</html>
