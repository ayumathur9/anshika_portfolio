<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

  <title>Production</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      text-align: center;
      padding: 80px 20px 30px;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 8vw, 80px);
      letter-spacing: 6px;
      margin: 0;
      color: #e8c97e;
    }

    .gallery {
      width: 100%;
      max-width: 1200px;
      margin: auto;
      padding: 0 20px;
    }

    .image-container {
      margin: 40px 0;
    }

    .image-container img {
      width: 100%;
      height: auto; /* KEY FIX: no cropping */
      display: block;
      border-radius: 12px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin: 60px 0;
      color: #e8c97e;
      text-decoration: none;
      font-size: 18px;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    /* Optional: spacing adjustment for mobile */
    @media (max-width: 768px) {
      .image-container {
        margin: 25px 0;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>PRODUCTION</h1>
  </div>

  <!-- GALLERY -->
  <div class="gallery">

    <div class="image-container">
      <img src="production/1.png" alt="">
    </div>

    <div class="image-container">
      <img src="production/2.png" alt="">
    </div>

    <div class="image-container">
      <img src="production/3.png" alt="">
    </div>

    <div class="image-container">
      <img src="production/4.png" alt="">
    </div>

    <div class="image-container">
      <img src="production/5.png" alt="">
    </div>

    <div class="image-container">
      <img src="production/6.png" alt="">
    </div>

  </div>

  <!-- BACK BUTTON -->
  <a href="index.html" class="back-link">← Back to Portfolio</a>

</body>
</html>
