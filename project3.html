<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

  <title>Exploration</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      text-align: center;
      padding: 80px 20px 30px;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 8vw, 80px);
      letter-spacing: 6px;
      color: #e8c97e;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 0 20px;
    }

    .section {
      margin: 60px 0;
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 20px;
      color: #e8c97e;
      letter-spacing: 1px;
    }

    .image-container {
      margin: 25px 0;
    }

    .image-container img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    .video-container {
      position: relative;
      padding-top: 56.25%; /* 16:9 */
      border-radius: 12px;
      overflow: hidden;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin: 60px 0;
      color: #e8c97e;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .section {
        margin: 40px 0;
      }

      .section-title {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>EXPLORATION</h1>
  </div>

  <div class="container">

    <!-- ILLUSTRATION -->
    <div class="section">
      <div class="section-title">ILLUSTRATION</div>

      <div class="image-container">
        <img src="exploration/Untitled_Artwork.png" alt="">
      </div>
    </div>

    <!-- EXPERIMENTAL VIDEO -->
    <div class="section">
      <div class="section-title">EXPERIMENTAL</div>

      <div class="video-container">
        <iframe 
          src="https://player.vimeo.com/video/1184310241?badge=0&autopause=0&player_id=0&app_id=58479&autoplay=1&muted=1&loop=1"
          allow="autoplay; fullscreen; picture-in-picture">
        </iframe>
      </div>
    </div>

    <!-- IMAGE 2 -->
    <div class="section">
      <div class="image-container">
        <img src="exploration/rhythm-project-brief.png" alt="">
      </div>
    </div>

  </div>

  <!-- BACK BUTTON -->
  <a href="index.html" class="back-link">← Back to Portfolio</a>

</body>
</html>
